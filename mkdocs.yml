site_name: VektorQuant Documentation
site_url: https://yourusername.github.io/VektorQuant
site_description: Institutional Grade Quantitative Analytics Platform
site_author: Omniscient Architect

theme:
  name: material
  palette:
    # Dark Mode Default
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # Light Mode Option
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - content.code.copy
    - navigation.expand
    - navigation.sections

nav:
  - Home: index.md
  - Architecture:
      - Backend: backend.md
      - Frontend: frontend.md
  - API Reference: api.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences